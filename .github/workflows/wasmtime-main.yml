name: "wasmtime: CI"
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: wasmtime-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-capi:
    name: Test C-API (macOS)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: wasmtime
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Install Ninja
        run: brew install ninja

      - name: Build C-API
        run: cargo build --release -p wasmtime-c-api

      - name: Run C-API tests via CMake
        run: |
          cmake -G Ninja -Sexamples -DCMAKE_BUILD_TYPE=Debug -Bexamples/build \
            -DBUILD_SHARED_LIBS=ON -DBUILD_TESTS=ON -DBUILD_RUST_EXAMPLES=ON
          ninja -C examples/build
          ninja -C examples/build test
        env:
          CTEST_OUTPUT_ON_FAILURE: 1
          CTEST_PARALLEL_LEVEL: 4

  cargo-test-capi:
    name: Cargo test wasmtime-c-api
    runs-on: macos-latest
    defaults:
      run:
        working-directory: wasmtime
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Run Rust tests for C-API crate
        run: cargo test -p wasmtime-c-api
