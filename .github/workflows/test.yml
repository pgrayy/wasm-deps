name: Test against sdk-typescript

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-componentize-js:
    name: Test componentize-js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build componentize-js
        working-directory: componentize-js
        run: npm install && npm run build

      - name: Clone sdk-typescript
        run: git clone --depth=1 https://github.com/strands-agents/sdk-typescript.git /tmp/sdk-ts

      - name: Install sdk-typescript dependencies
        working-directory: /tmp/sdk-ts
        run: npm ci

      - name: Link local componentize-js
        working-directory: /tmp/sdk-ts
        run: npm link ${{ github.workspace }}/componentize-js

      - name: Run sdk-typescript tests
        working-directory: /tmp/sdk-ts
        run: npm test

  test-jco:
    name: Test jco
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build jco
        working-directory: jco
        run: npm install && npm run build

      - name: Clone sdk-typescript
        run: git clone --depth=1 https://github.com/strands-agents/sdk-typescript.git /tmp/sdk-ts

      - name: Install sdk-typescript dependencies
        working-directory: /tmp/sdk-ts
        run: npm ci

      - name: Link local jco
        working-directory: /tmp/sdk-ts
        run: npm link ${{ github.workspace }}/jco/packages/jco

      - name: Run sdk-typescript tests
        working-directory: /tmp/sdk-ts
        run: npm test
