name: Test
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-wasmtime:
    name: Lint wasmtime (fmt + clippy)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip2
      - run: cargo fmt --all -- --check
        working-directory: wasmtime
      - run: cargo clippy -p wasmtime-c-api --all-targets
        working-directory: wasmtime

  build-wasmtime:
    name: Build wasmtime C API
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - name: Build C API
        working-directory: wasmtime
        run: cargo build --release -p wasmtime-c-api
      - uses: actions/upload-artifact@v4
        with:
          name: wasmtime-c-api
          path: wasmtime/target/release/libwasmtime.dylib

  test-wasmtime:
    name: Test wasmtime C API
    needs: [build-wasmtime]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1,wasm32-wasip2,wasm32-unknown-unknown
      - name: Install Ninja
        run: brew install ninja
      - name: Build and run C API tests
        working-directory: wasmtime
        run: |
          cmake -G Ninja -Sexamples -DCMAKE_BUILD_TYPE=Debug -Bexamples/build \
            -DBUILD_SHARED_LIBS=ON -DBUILD_TESTS=ON -DBUILD_RUST_EXAMPLES=ON
          ninja -C examples/build
          ninja -C examples/build test
        env:
          CTEST_OUTPUT_ON_FAILURE: 1
          CTEST_PARALLEL_LEVEL: 4

  test-wasmtime-py:
    name: Test wasmtime-py
    needs: [build-wasmtime]
    runs-on: macos-latest
    defaults:
      run:
        working-directory: wasmtime-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: astral-sh/setup-uv@v7
      - run: uv run ci/download-wasmtime.py
      - run: uv run --all-extras pytest
