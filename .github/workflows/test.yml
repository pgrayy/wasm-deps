name: Test
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_wasmtime:
        description: 'Test wasmtime'
        type: boolean
        default: true
      run_wasmtime_py:
        description: 'Test wasmtime-py'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      wasmtime: ${{ steps.filter.outputs.wasmtime }}
      wasmtime_py: ${{ steps.filter.outputs.wasmtime_py }}
    steps:
      - id: filter
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --paginate --jq '.[].filename')
          else
            FILES=""
          fi

          check_path() {
            local name="$1" path="$2"
            if echo "$FILES" | grep -q "^${path}/"; then
              echo "${name}=true" >> $GITHUB_OUTPUT
            else
              echo "${name}=false" >> $GITHUB_OUTPUT
            fi
          }

          check_path wasmtime wasmtime
          check_path wasmtime_py wasmtime-py

  lint-wasmtime:
    name: Lint wasmtime
    needs: [detect-changes]
    if: needs.detect-changes.outputs.wasmtime == 'true' || inputs.run_wasmtime == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip2
      - run: cargo fmt --all -- --check
        working-directory: wasmtime
      - run: cargo clippy -p wasmtime-c-api --all-targets
        working-directory: wasmtime

  build-wasmtime:
    name: Build wasmtime
    needs: [detect-changes]
    if: needs.detect-changes.outputs.wasmtime == 'true' || inputs.run_wasmtime == true
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wasmtime
      - name: Build
        working-directory: wasmtime
        run: cargo build --release -p wasmtime-c-api
      - uses: actions/upload-artifact@v4
        with:
          name: wasmtime-c-api
          path: wasmtime/target/release/libwasmtime.dylib

  test-wasmtime:
    name: Test wasmtime
    needs: [detect-changes]
    if: needs.detect-changes.outputs.wasmtime == 'true' || inputs.run_wasmtime == true
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1,wasm32-wasip2,wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wasmtime
      - name: Build and test
        working-directory: wasmtime
        run: |
          cmake -G Ninja -Sexamples -DCMAKE_BUILD_TYPE=Debug -Bexamples/build \
            -DBUILD_SHARED_LIBS=ON -DBUILD_TESTS=ON -DBUILD_RUST_EXAMPLES=ON
          ninja -C examples/build
          ninja -C examples/build test
        env:
          CTEST_OUTPUT_ON_FAILURE: 1
          CTEST_PARALLEL_LEVEL: 4

  test-wasmtime-py:
    name: Test wasmtime-py
    needs: [detect-changes, build-wasmtime]
    if: |
      !failure() && !cancelled() &&
      (
        needs.detect-changes.outputs.wasmtime == 'true' ||
        needs.detect-changes.outputs.wasmtime_py == 'true' ||
        inputs.run_wasmtime == true ||
        inputs.run_wasmtime_py == true
      )
    runs-on: macos-latest
    defaults:
      run:
        working-directory: wasmtime-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: astral-sh/setup-uv@v7
      - name: Download artifact
        if: needs.build-wasmtime.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: wasmtime-c-api
          path: wasmtime-py/wasmtime/darwin-aarch64
      - name: Rename artifact
        if: needs.build-wasmtime.result == 'success'
        run: mv wasmtime/darwin-aarch64/libwasmtime.dylib wasmtime/darwin-aarch64/_libwasmtime.dylib
      - name: Download release
        if: needs.build-wasmtime.result == 'skipped'
        run: uv run ci/download-wasmtime.py
      - name: Test
        run: uv run --all-extras pytest
