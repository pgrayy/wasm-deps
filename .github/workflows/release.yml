name: Release
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-wasmtime:
    name: Build wasmtime
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: wasmtime
        run: cargo build --release -p wasmtime-c-api

      - name: Package
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          DIR="wasmtime-${VERSION}-aarch64-macos-c-api"
          mkdir -p "${DIR}/lib" "${DIR}/include"
          cp wasmtime/target/release/libwasmtime.dylib "${DIR}/lib/"
          cp -r wasmtime/crates/c-api/include/* "${DIR}/include/"
          sed -e 's/#cmakedefine \(WASMTIME_FEATURE_.*\)/#define \1/' \
            wasmtime/crates/c-api/include/wasmtime/conf.h.in \
            > "${DIR}/include/wasmtime/conf.h"
          tar cJf "${DIR}.tar.xz" "${DIR}"

      - name: Upload to release
        run: gh release upload "${{ github.event.release.tag_name }}" wasmtime-*-c-api.tar.xz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wasmtime-py:
    name: Build wasmtime-py
    needs: [build-wasmtime]
    runs-on: macos-latest
    defaults:
      run:
        working-directory: wasmtime-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: pip install build
      - name: Build wheel
        run: python -m build --wheel -C=--build-option=--plat-name -C=--build-option=macosx-11-0-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-arm64
          path: wasmtime-py/dist/*.whl

  publish:
    name: Publish
    needs: [build-wasmtime-py]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload to release
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.whl
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
