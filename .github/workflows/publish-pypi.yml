name: Publish wasmtime-py wheels

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    name: Build and publish macOS wheels
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel (macOS x86_64)
        working-directory: wasmtime-py
        run: |
          git clean -fdx wasmtime build
          python -m build --wheel -C=--build-option=--plat-name -C=--build-option=macosx-10-13-x86_64

      - name: Build wheel (macOS arm64)
        working-directory: wasmtime-py
        run: |
          git clean -fdx wasmtime build
          python -m build --wheel -C=--build-option=--plat-name -C=--build-option=macosx-11-0-arm64

      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: wasmtime-py/dist/*.whl
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        working-directory: wasmtime-py
        run: twine upload dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
