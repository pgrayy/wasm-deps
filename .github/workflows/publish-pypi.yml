name: Publish wasmtime-py wheels

on:
  release:
    types: [published]

jobs:
  build-macos-arm64:
    name: Build macOS arm64 wheel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build pycparser

      - name: Build wasmtime C API from source
        working-directory: wasmtime
        run: cargo build --release -p wasmtime-c-api

      - name: Place library and headers
        run: |
          mkdir -p wasmtime-py/wasmtime/darwin-aarch64
          cp wasmtime/target/release/libwasmtime.dylib wasmtime-py/wasmtime/darwin-aarch64/_libwasmtime.dylib
          rm -rf wasmtime-py/wasmtime/include
          cp -r wasmtime/crates/c-api/include wasmtime-py/wasmtime/include
          sed -e 's/#cmakedefine \(WASMTIME_FEATURE_.*\)/#define \1/' \
            wasmtime/crates/c-api/include/wasmtime/conf.h.in \
            > wasmtime-py/wasmtime/include/wasmtime/conf.h

      - name: Generate Python bindings
        working-directory: wasmtime-py
        run: python ci/cbindgen.py wasmtime/include/wasmtime.h > wasmtime/_bindings.py

      - name: Build wheel
        working-directory: wasmtime-py
        run: python -m build --wheel -C=--build-option=--plat-name -C=--build-option=macosx-11-0-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-arm64
          path: wasmtime-py/dist/*.whl

  publish:
    name: Publish
    needs: [build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
